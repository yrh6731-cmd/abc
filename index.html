<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Pro</title>
    <style>
        @font-face {
            font-family: 'SF Pro KR';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
        }

        :root {
            --apple-pink: #ffdae3;
            --apple-dark-pink: #ff85a1;
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --apple-text: #1d1d1f;
        }

        body {
            font-family: 'SF Pro KR', -apple-system, sans-serif;
            margin: 0; background-color: var(--apple-bg); color: var(--apple-text);
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 1s ease; overflow-x: hidden;
        }

        /* --- 1. Apple 정품 부팅 시퀀스 --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }
        .apple-logo { font-size: 70px; color: white; margin-bottom: 50px; cursor: default; }
        .boot-bar { width: 160px; height: 3px; background: #333; border-radius: 10px; overflow: hidden; }
        .boot-progress { width: 0%; height: 100%; background: #fff; animation: load 2s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes load { 100% { width: 100%; } }

        /* --- 2. Apple 스타일 상단 바 --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 48px;
            background: rgba(255, 255, 255, 0.75); backdrop-filter: saturate(180%) blur(20px);
            z-index: 5000; display: flex; justify-content: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .nav-content { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 22px; }
        .nav-logo { font-weight: 600; font-size: 17px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 5px; }
        .nav-logo span { color: var(--apple-dark-pink); }
        .nav-links { display: flex; gap: 30px; }
        .nav-link { font-size: 13px; opacity: 0.6; cursor: pointer; transition: 0.3s; font-weight: 400; }
        .nav-link:hover { opacity: 1; }
        .nav-link.active { opacity: 1; font-weight: 600; color: var(--apple-dark-pink); }

        /* --- 3. 몽글몽글 디자인 레이아웃 --- */
        section { padding: 80px 22px; max-width: 1100px; margin: 0 auto; min-height: 100vh; box-sizing: border-box; }
        .headline { font-size: 48px; font-weight: 700; letter-spacing: -1px; text-align: center; margin-bottom: 40px; }
        
        .grid-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        
        .glass-panel {
            background: var(--apple-card); backdrop-filter: blur(30px);
            border-radius: 30px; padding: 24px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        /* 캘린더 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-cell {
            aspect-ratio: 1; border-radius: 12px; background: rgba(255,255,255,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.03);
        }
        .cal-cell:hover { background: #fff; transform: scale(1.05); }
        .cal-cell.selected { background: var(--apple-dark-pink); color: white; border: none; }
        .att-count { font-size: 8px; font-weight: bold; margin-top: 2px; color: var(--apple-dark-pink); }
        .cal-cell.selected .att-count { color: rgba(255,255,255,0.8); }

        /* 학생 카드 */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .st-card {
            background: #fff; border-radius: 24px; padding: 20px; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative;
            border: 1.5px solid var(--apple-pink); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .st-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(255, 133, 161, 0.12); }
        .st-name { display: block; font-weight: 600; font-size: 17px; margin-bottom: 12px; }
        
        .delete-btn {
            position: absolute; top: 12px; right: 12px; width: 20px; height: 20px;
            background: #f2f2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #8e8e93; cursor: pointer; border: none; transition: 0.2s;
        }
        .delete-btn:hover { background: #ff3b30; color: white; }

        .btn-status {
            border: none; border-radius: 12px; padding: 10px; width: 100%; font-family: inherit;
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px;
        }
        .status-present { background: #eafaf1; color: #34c759; }
        .status-absent { background: #fff1f0; color: #ff3b30; }
        .status-late { background: #fff9e6; color: #ffcc00; }

        /* 입력 폼 */
        input[type="text"], textarea {
            width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #d2d2d7;
            background: rgba(255,255,255,0.8); font-family: inherit; font-size: 14px;
            outline: none; transition: 0.3s; box-sizing: border-box; text-align: center;
        }
        input:focus { border-color: var(--apple-dark-pink); background: #fff; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: var(--apple-dark-pink); color: white; font-weight: 600;
            font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-main:hover { opacity: 0.9; transform: scale(0.99); }

        .hidden { display: none !important; }
        .bg-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="apple-logo"></div>
    <div class="boot-bar"><div class="boot-progress"></div></div>
</div>

<nav>
    <div class="nav-content">
        <div class="nav-logo"> <span>Classroom</span> Pro</div>
        <div class="nav-links">
            <div class="nav-link active" id="tab-att-link" onclick="tab('att')">출석부</div>
            <div class="nav-link" id="tab-log-link" onclick="tab('log')">누가기록</div>
        </div>
    </div>
</nav>

<section id="sec-att">
    <h1 class="headline">좋은 아침입니다.</h1>
    <div class="grid-layout">
        <div class="sidebar">
            <div class="glass-panel">
                <div id="month-name" style="font-weight: 700; margin-bottom: 15px; text-align: center;"></div>
                <div class="calendar-grid" id="cal-body"></div>
            </div>
            <div class="glass-panel" style="margin-top: 20px;">
                <h4 style="margin: 0 0 12px 0; font-size: 14px;">To-Do</h4>
                <div id="todo-list" style="font-size: 13px; line-height: 2;"></div>
                <input type="text" id="todo-in" placeholder="할 일 입력..." style="margin-top:10px; padding:8px;" onkeypress="if(event.keyCode==13) addTodo()">
            </div>
        </div>
        
        <div class="main-content">
            <div class="glass-panel">
                <div id="selected-date-label" style="font-weight: 700; font-size: 18px; margin-bottom: 20px; color: var(--apple-dark-pink);"></div>
                <input type="text" id="st-name-in" placeholder="학생 이름을 추가하고 엔터를 누르세요" onkeypress="if(event.keyCode==13) addStudent()">
                <div class="student-grid" id="att-list" style="margin-top: 25px;"></div>
                <button class="btn-main" onclick="saveAtt()">기록 저장하기</button>
            </div>
        </div>
    </div>
</section>

<section id="sec-log" class="hidden">
    <h1 class="headline">성장 누가기록.</h1>
    <div class="glass-panel">
        <div class="student-grid" id="log-list"></div>
        <button class="btn-main" style="max-width: 400px; margin: 40px auto; display: block;" onclick="saveLog()">전체 누가기록 저장</button>
    </div>
</section>

<div class="bg-hint">사진을 화면에 드래그하여 배경을 변경하세요</div>

<script>
    // 부팅 시퀀스
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 800);
        }, 2200);
    };

    // 배경화면 드래그 앤 드롭
    const savedBg = localStorage.getItem('apple_pro_bg');
    if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
    window.ondragover = e => e.preventDefault();
    window.ondrop = e => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = ev => {
                document.body.style.backgroundImage = `url(${ev.target.result})`;
                localStorage.setItem('apple_pro_bg', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    };

    // 데이터 핸들링
    let masterList = JSON.parse(localStorage.getItem('master_students')) || [];
    let records = JSON.parse(localStorage.getItem('daily_records')) || {};
    let logs = JSON.parse(localStorage.getItem('student_logs')) || {};
    let todos = JSON.parse(localStorage.getItem('cloud_todos')) || [];
    let curDate = new Date().toISOString().split('T')[0];

    function init() {
        renderCal(); renderAtt(); renderLog(); renderTodo();
        document.getElementById('selected-date-label').innerText = `📅 ${curDate}`;
    }

    function tab(name) {
        const isAtt = name === 'att';
        document.getElementById('sec-att').classList.toggle('hidden', !isAtt);
        document.getElementById('sec-log').classList.toggle('hidden', isAtt);
        document.getElementById('tab-att-link').classList.toggle('active', isAtt);
        document.getElementById('tab-log-link').classList.toggle('active', !isAtt);
    }

    function renderCal() {
        const n = new Date(); const y = n.getFullYear(); const m = n.getMonth();
        document.getElementById('month-name').innerText = `${y}년 ${m + 1}월`;
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        const body = document.getElementById('cal-body');
        body.innerHTML = '';
        for (let i = 0; i < first; i++) body.innerHTML += '<div></div>';
        for (let d = 1; d <= last; d++) {
            const s = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel = curDate === s;
            let count = records[s] ? records[s].filter(x => x.status === 'present').length : "";
            const cell = document.createElement('div');
            cell.className = `cal-cell ${isSel ? 'selected' : ''}`;
            cell.innerHTML = `<span>${d}</span>${count ? `<span class="att-count">출석:${count}</span>` : ''}`;
            cell.onclick = () => { curDate = s; document.getElementById('selected-date-label').innerText = `📅 ${curDate}`; renderCal(); renderAtt(); };
            body.appendChild(cell);
        }
    }

    function renderAtt() {
        const list = document.getElementById('att-list');
        list.innerHTML = '';
        // 현재 날짜의 기록이 없으면 마스터 리스트에서 새로 생성
        const data = records[curDate] || masterList.map(name => ({ name, status: 'present', note: '' }));
        
        // 마스터 리스트에는 있는데 현재 날짜 기록에는 없는 학생 추가 (동기화)
        if (records[curDate]) {
            const currentNames = data.map(x => x.name);
            masterList.forEach(mName => {
                if (!currentNames.includes(mName)) data.push({ name: mName, status: 'present', note: '' });
            });
        }

        data.forEach((st, i) => {
            const card = document.createElement('div');
            card.className = 'st-card';
            const statusClass = `status-${st.status}`;
            const statusText = st.status === 'present' ? '✅ 출석' : (st.status === 'absent' ? '❌ 결석' : '🕒 지각');
            
            card.innerHTML = `
                <button class="delete-btn" onclick="removeStudent('${st.name}')">✕</button>
                <span class="st-name">🏫 ${st.name}</span>
                <button class="btn-status ${statusClass}" onclick="toggleStatus(${i})">${statusText}</button>
                <input type="text" placeholder="사유 입력" class="${st.status==='present'?'hidden':''}" 
                    style="margin-top:12px; font-size:12px; padding:8px;" value="${st.note || ''}" oninput="updateNote(${i}, this.value)">
            `;
            list.appendChild(card);
        });
        window.currentData = data;
    }

    function toggleStatus(i) {
        const modes = ['present', 'absent', 'late'];
        window.currentData[i].status = modes[(modes.indexOf(window.currentData[i].status) + 1) % 3];
        renderAtt();
    }
    
    function updateNote(i, val) { window.currentData[i].note = val; }

    function addStudent() {
        const inp = document.getElementById('st-name-in');
        const name = inp.value.trim();
        if (name && !masterList.includes(name)) {
            masterList.push(name);
            saveMaster();
            inp.value = '';
            renderAtt(); renderLog();
        }
    }

    function removeStudent(name) {
        if (confirm(`'${name}' 학생을 명단에서 삭제할까요?`)) {
            // 1. 마스터 리스트에서 삭제
            masterList = masterList.filter(n => n !== name);
            saveMaster();
            // 2. 현재 화면 데이터에서도 삭제
            window.currentData = window.currentData.filter(x => x.name !== name);
            // 3. 기록들에서도 삭제 (선택 사항이나 깔끔한 데이터 관리를 위해)
            delete logs[name];
            localStorage.setItem('student_logs', JSON.stringify(logs));
            
            renderAtt(); renderLog();
        }
    }

    function saveMaster() { localStorage.setItem('master_students', JSON.stringify(masterList)); }

    function saveAtt() {
        records[curDate] = window.currentData;
        localStorage.setItem('daily_records', JSON.stringify(records));
        alert('출석 기록이 안전하게 저장되었습니다.');
        renderCal();
    }

    function renderLog() {
        const list = document.getElementById('log-list');
        list.innerHTML = '';
        masterList.forEach(name => {
            const card = document.createElement('div');
            card.className = 'st-card';
            card.innerHTML = `
                <span class="st-name">🏫 ${name}</span>
                <textarea style="height:100px; text-align:left; font-size:13px;" placeholder="특이사항 기록..." oninput="updateLog('${name}', this.value)">${logs[name] || ''}</textarea>
            `;
            list.appendChild(card);
        });
    }
    function updateLog(name, val) { logs[name] = val; }
    function saveLog() { localStorage.setItem('student_logs', JSON.stringify(logs)); alert('모든 누가기록이 저장되었습니다.'); }

    function renderTodo() {
        document.getElementById('todo-list').innerHTML = todos.map((t, i) => `<div style="display:flex; justify-content:space-between;"><span>• ${t}</span><span style="cursor:pointer; color:#ccc;" onclick="delTodo(${i})">✕</span></div>`).join('');
        localStorage.setItem('cloud_todos', JSON.stringify(todos));
    }
    function addTodo() { const inp = document.getElementById('todo-in'); if(inp.value.trim()){ todos.push(inp.value.trim()); inp.value=''; renderTodo(); } }
    function delTodo(i) { todos.splice(i, 1); renderTodo(); }

    init();
</script>

</body>
</html>
